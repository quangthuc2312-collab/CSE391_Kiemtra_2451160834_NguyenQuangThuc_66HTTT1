<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý hồ sơ chuyển đổi số</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container my-4">
        <div class="header-box text-center text-white py-4 px-3">
            <h3>☁ Hệ thống Quản lý Hồ sơ Chuyển đổi Số</h3>
            <p>Sở Giáo dục & Đào tạo — Ứng dụng quản lý tiến trình chuyển đổi số các trường học</p>
        </div>

        <div class="main-box p-3 p-md-4">
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card form-card">
                        <div class="card-body">
                            <h5 class="mb-4 text-primary">⊕ Thêm hồ sơ mới</h5>

                            <label class="form-label">Tên trường</label>
                            <input id="schoolName" class="form-control mb-3" type="text" placeholder="VD: Trường THPT Nguyễn Huệ">

                            <label class="form-label">Đơn vị quản lý</label>
                            <select id="unit" class="form-select mb-3">
                                <option value="">-- Chọn đơn vị --</option>
                                <option>Phòng GD&ĐT TP. Thủy Lợi</option>
                                <option>Phòng GD&ĐT H. Thủy Nguyên</option>
                                <option>Phòng GD&ĐT Q. Hồng Bàng</option>
                                <option>Phòng GD&ĐT Q. Lê Chân</option>
                            </select>

                            <label class="form-label">Trạng thái chuyển đổi</label>
                            <select id="status" class="form-select mb-3">
                                <option value="">-- Chọn trạng thái --</option>
                                <option>Chưa bắt đầu</option>
                                <option>Đang triển khai</option>
                                <option>Hoàn thành</option>
                            </select>

                            <label class="form-label">Mô tả tiến độ</label>
                            <textarea id="description" class="form-control mb-3" rows="4" placeholder="Mô tả tình hình chuyển đổi số..."></textarea>

                            <button id="addBtn" class="btn btn-primary w-100">+ Thêm hồ sơ</button>
                            <div id="message" class="mt-3"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                        <div class="btn-group filter-group" role="group">
                            <button class="btn btn-primary active" data-filter="Tất cả">Tất cả</button>
                            <button class="btn btn-light" data-filter="Chưa bắt đầu">Chưa bắt đầu</button>
                            <button class="btn btn-light" data-filter="Đang triển khai">Đang triển khai</button>
                            <button class="btn btn-light" data-filter="Hoàn thành">Hoàn thành</button>
                        </div>
                        <span id="countBox" class="badge bg-primary rounded-pill px-3 py-2">0 hồ sơ</span>
                    </div>

                    <div id="recordList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="data/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
